<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Removes scrollbars around the iframe */
        }
        iframe {
            width: 100%;
            height: 100vh; /* Takes up the full height of the browser window */
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="Aggelos_Ladas-Official-CV.pdf" title="Embedded PDF">
        <p>Your browser does not support PDFs. 
           <a href="Aggelos_Ladas-Official-CV.pdf">Download the PDF</a> instead.
        </p>
    </iframe>

</body>
</html>
